{% extends "base.html" %}

{% block content %}
<section class="card form-card">
    <h1>Entrar</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn">Entrar</button>
    </form>

    <p class="help-text">
        Ainda não tem conta?
        <a href="{% url 'register' %}">Cadastre-se aqui</a>.
    </p>
</section>
{% endblock %}
